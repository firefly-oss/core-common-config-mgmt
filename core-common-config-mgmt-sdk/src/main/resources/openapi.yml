          description: Total number of failed requests
          format: int64
          readOnly: true
          example: 42
        averageResponseTimeMs:
          type: integer
          description: Average response time in milliseconds
          format: int32
          readOnly: true
          example: 245
        approvedByUserId:
          type: string
          description: Reference to user who approved this provider-tenant relationship
