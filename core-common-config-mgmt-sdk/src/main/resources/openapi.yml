openapi: 3.0.1
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost:18080
  description: Generated server url
tags:
- name: Channel Config Parameters
  description: Dynamic configuration parameters for channels
- name: Provider Parameters
  description: API for managing provider parameters and configuration
- name: Tenant Management
  description: "Manage logical tenant separations in Firefly core banking. Tenants\
    \ enable multi-tenancy where different banking organizations share infrastructure\
    \ while maintaining separate configurations, providers, branding, and operational\
    \ settings. Use these APIs to create, configure, and manage tenant instances,\
    \ their provider relationships, and access tenant-specific resources like settings\
    \ and branding."
- name: Channel Configuration
  description: "APIs for managing channel configurations (Web Banking, Mobile, ATM,\
    \ etc.)"
- name: Provider Statuses
  description: API for managing provider statuses
- name: Tenant Statuses
  description: API for managing tenant statuses
- name: Webhook Configuration
  description: "Configure event-driven HTTP callbacks for real-time notifications.\
    \ Webhooks enable Firefly to push events (payments, account changes, KYC updates,\
    \ fraud alerts) to external systems in real-time. Configure target URLs, authentication\
    \ (HMAC, OAuth2, API keys), event filtering, retry policies with exponential backoff,\
    \ batching, circuit breakers, and SSL verification. Monitor webhook health, delivery\
    \ success rates, response times, and troubleshoot failures with detailed metrics."
- name: Provider Types
  description: API for managing provider types
- name: Tenant Settings
  description: "API for managing tenant operational settings including rate limiting,\
    \ security policies, circuit breakers, and compliance"
- name: Provider Management
  description: "Manage external service provider integrations for Firefly core banking.\
    \ Providers are third-party services that Firefly integrates with to deliver banking\
    \ capabilities such as payment processing, KYC/AML verification, card issuing,\
    \ fraud detection, and more. Use these APIs to register providers, configure API\
    \ endpoints, manage credentials, track SLAs, monitor health status, and maintain\
    \ provider contracts and certifications."
- name: API Process Mappings
  description: API for managing API-to-Process mappings in the Firefly Plugin Architecture
- name: Feature Flags
  description: API for managing feature flags and feature toggles
- name: Provider-Tenant Relationships
  description: "Manage provider integration configurations for specific tenants. Provider-Tenant\
    \ relationships define how a tenant uses an external service provider, including\
    \ tenant-specific configuration overrides, billing models (transaction-based,\
    \ volume-based, flat-fee), priority for load balancing, failover settings, circuit\
    \ breaker thresholds, transaction limits, and usage tracking. Use these APIs to\
    \ associate providers with tenants, configure relationship settings, monitor usage\
    \ metrics, and manage provider failover strategies."
- name: Provider Value Mappings
  description: API for managing value mappings between Firefly and providers
- name: Environment Configurations
  description: "API for managing environment-specific configurations (dev, staging,\
    \ production)"
- name: Tenant Brandings
  description: API for managing tenant branding and visual configuration
- name: Configuration Audits
  description: API for managing configuration audit trail with rollback capabilities
paths:
  /api/v1/webhook-configs/{id}:
    get:
      tags:
      - Webhook Configuration
      summary: Retrieve webhook configuration by ID
      description: "Fetches complete webhook configuration including target URL, event\
        \ filters, authentication settings, retry policies, batching configuration,\
        \ circuit breaker settings, and delivery metrics (success rate, average response\
        \ time, failure count). Sensitive fields like secret keys are masked in the\
        \ response."
      operationId: getWebhookConfigById
      parameters:
      - name: id
        in: path
        description: Unique identifier (UUID) of the webhook configuration to retrieve
        required: true
        schema:
          type: string
          format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
      - name: X-Idempotency-Key
        in: header
        description: "Unique key for idempotent requests. If provided, ensures that\
          \ identical requests with the same key will only be processed once."
        required: false
        schema:
          type: string
      responses:
        "200":
          description: Webhook configuration successfully retrieved
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/WebhookConfigDTO"
        "404":
          description: Webhook configuration not found - The specified webhook ID
            does not exist
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/WebhookConfigDTO"
        "403":
          description: Access denied - Insufficient permissions to view this webhook
            configuration
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/WebhookConfigDTO"
    put:
      tags:
      - Webhook Configuration
      summary: Update existing webhook configuration
      description: "Updates webhook configuration including URL, event filters, authentication\
        \ settings, retry policies, and circuit breaker thresholds. Uses optimistic\
        \ locking to prevent concurrent modifications. Changing authentication settings\
        \ or URL may require re-verification. Delivery metrics are preserved but can\
        \ be reset if needed. Disabling a webhook stops event delivery but preserves\
        \ configuration."
      operationId: updateWebhookConfig
      parameters:
      - name: id
        in: path
        description: ID of the webhook configuration to update
        required: true
        schema:
          type: string
          format: uuid
      - name: X-Idempotency-Key
        in: header
        description: "Unique key for idempotent requests. If provided, ensures that\
          \ identical requests with the same key will only be processed once."
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookConfigDTO"
        required: true
      responses:
        "200":
          description: Webhook configuration successfully updated - Returns updated
            webhook with new version number
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/WebhookConfigDTO"
        "404":
          description: Webhook configuration not found - The specified webhook ID
            does not exist
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/WebhookConfigDTO"
        "400":
          description: Invalid input - Validation errors or business rule violations
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/WebhookConfigDTO"
        "409":
          description: Conflict - Version mismatch due to concurrent modification
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/WebhookConfigDTO"
    delete:
      tags:
      - Webhook Configuration
      summary: Delete a webhook configuration
      operationId: deleteWebhookConfig
      parameters:
      - name: id
        in: path
        description: ID of the webhook configuration to delete
        required: true
        schema:
          type: string
          format: uuid
      - name: X-Idempotency-Key
        in: header
        description: "Unique key for idempotent requests. If provided, ensures that\
          \ identical requests with the same key will only be processed once."
        required: false
        schema:
          type: string
      responses:
        "204":
          description: Webhook configuration deleted
        "404":
          description: Webhook configuration not found
  /api/v1/tenants/{tenantId}/providers/{id}:
