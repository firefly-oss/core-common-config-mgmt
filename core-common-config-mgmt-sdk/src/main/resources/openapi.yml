  /api/v1/api-process-mappings/resolve:
    get:
      tags:
      - API Process Mappings
      summary: Resolve the process mapping for an API operation
      description: "Resolves the best matching process mapping based on tenant, operation,\
        \ product, and channel. Priority resolution order: tenant+product+channel\
        \ > tenant+product > tenant > vanilla"
      operationId: resolveApiProcessMapping
      parameters:
      - name: tenantId
        in: query
        description: Tenant ID for the resolution context
        required: false
        schema:
          type: string
          format: uuid
      - name: operationId
        in: query
        description: "API operation ID (e.g., 'createAccount', 'processPayment')"
        required: true
        schema:
          type: string
      - name: productId
        in: query
        description: Product ID for more specific routing
        required: false
        schema:
          type: string
          format: uuid
      - name: channelType
        in: query
        description: "Channel type (e.g., 'API', 'MOBILE', 'BRANCH')"
        required: false
        schema:
          type: string
      - name: X-Idempotency-Key
        in: header
        description: "Unique key for idempotent requests. If provided, ensures that\
          \ identical requests with the same key will only be processed once."
        required: false
        schema:
          type: string
      responses:
        "200":
          description: Mapping resolved
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiProcessMappingDTO"
        "404":
          description: No matching mapping found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiProcessMappingDTO"
