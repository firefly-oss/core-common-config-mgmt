          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProviderTenantDTO"
    put:
      tags:
      - Tenant Management
      summary: Update a provider-tenant relationship
      description: Updates a provider-tenant relationship for a specific tenant and
        returns it
      operationId: updateTenantProvider
      parameters:
