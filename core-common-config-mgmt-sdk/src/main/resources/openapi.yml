  /api/v1/providers/{id}:
    get:
      tags:
      - Provider Management
      summary: Retrieve provider by ID
      description: "Fetches complete provider information including API configuration\
        \ (production/sandbox URLs), supported capabilities, SLA commitments, compliance\
        \ certifications, contract details, contact information, and current health\
        \ status. Returns 404 if provider does not exist."
      operationId: getProviderById
      parameters:
      - name: id
        in: path
        description: Unique identifier (UUID) of the provider to retrieve
        required: true
        schema:
          type: string
          format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
      - name: X-Idempotency-Key
        in: header
        description: "Unique key for idempotent requests. If provided, ensures that\
          \ identical requests with the same key will only be processed once."
        required: false
        schema:
          type: string
      responses:
        "200":
          description: Provider successfully retrieved
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProviderDTO"
        "404":
          description: Provider not found - The specified provider ID does not exist
            or has been deleted
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProviderDTO"
        "403":
          description: Access denied - Insufficient permissions to view this provider
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProviderDTO"
    put:
      tags:
      - Provider Management
      summary: Update existing provider
      description: "Updates provider configuration including API endpoints, capabilities,\
        \ SLA commitments, certifications, contract details, contact information,\
        \ and health monitoring settings. Uses optimistic locking via version field\
        \ to prevent concurrent modification conflicts. Changing provider status may\
        \ affect all tenant relationships using this provider. Health status and metrics\
        \ are typically updated automatically by monitoring systems."
      operationId: updateProvider
      parameters:
      - name: id
        in: path
        description: Unique identifier (UUID) of the provider to update
        required: true
        schema:
          type: string
          format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
      - name: X-Idempotency-Key
        in: header
        description: "Unique key for idempotent requests. If provided, ensures that\
          \ identical requests with the same key will only be processed once."
        required: false
