        autoFailoverEnabled:
          type: boolean
          description: Indicates if automatic failover is enabled on provider failure
          example: true
        fallbackProviderId:
          type: string
          description: Reference to fallback provider if this provider fails
          format: uuid
        maxConsecutiveFailures:
          type: integer
