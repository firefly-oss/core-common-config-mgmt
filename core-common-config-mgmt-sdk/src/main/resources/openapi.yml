        required: true
        schema:
          type: string
          format: uuid
      - name: X-Idempotency-Key
        in: header
        description: "Unique key for idempotent requests. If provided, ensures that\
          \ identical requests with the same key will only be processed once."
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProviderTenantDTO"
        required: true
      responses:
        "200":
          description: Provider-tenant relationship updated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProviderTenantDTO"
        "400":
          description: Invalid input
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProviderTenantDTO"
        "404":
          description: Provider-tenant relationship not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProviderTenantDTO"
    delete:
      tags:
      - Tenant Management
      summary: Remove a provider from a tenant
      description: Deletes a provider-tenant relationship for a specific tenant
      operationId: removeTenantProvider
      parameters:
      - name: tenantId
        in: path
        description: ID of the tenant
        required: true
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        description: ID of the provider-tenant relationship to delete
        required: true
        schema:
          type: string
          format: uuid
      - name: X-Idempotency-Key
        in: header
        description: "Unique key for idempotent requests. If provided, ensures that\
          \ identical requests with the same key will only be processed once."
        required: false
        schema:
          type: string
      responses:
        "204":
          description: Provider removed from tenant
        "404":
          description: Provider-tenant relationship not found
  /api/v1/tenants/{id}:
    get:
      tags:
      - Tenant Management
      summary: Retrieve tenant by ID
      description: "Fetches complete tenant information including legal entity details,\
        \ hierarchical structure, risk ratings, compliance tier, subscription details,\
        \ and contact information. Returns 404 if tenant does not exist or is not\
        \ accessible."
      operationId: getTenantById
      parameters:
      - name: id
        in: path
        description: Unique identifier (UUID) of the tenant to retrieve
        required: true
        schema:
          type: string
          format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
      - name: X-Idempotency-Key
        in: header
        description: "Unique key for idempotent requests. If provided, ensures that\
          \ identical requests with the same key will only be processed once."
        required: false
        schema:
          type: string
      responses:
        "200":
          description: Tenant successfully retrieved
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TenantDTO"
        "404":
          description: Tenant not found - The specified tenant ID does not exist or
            has been deleted
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TenantDTO"
        "403":
          description: Access denied - Insufficient permissions to view this tenant
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TenantDTO"
    put:
      tags:
      - Tenant Management
      summary: Update existing tenant
      description: "Updates tenant information including legal entity details, contact\
        \ information, risk ratings, compliance settings, subscription details, and\
        \ metadata. Uses optimistic locking via version field to prevent concurrent\
        \ modification conflicts. All fields except ID and audit timestamps can be\
        \ updated. Changing tenant status or type may trigger validation rules and\
        \ workflow approvals."
      operationId: updateTenant
      parameters:
      - name: id
        in: path
        description: Unique identifier (UUID) of the tenant to update
        required: true
        schema:
          type: string
          format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
      - name: X-Idempotency-Key
        in: header
        description: "Unique key for idempotent requests. If provided, ensures that\
          \ identical requests with the same key will only be processed once."
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantDTO"
        required: true
      responses:
        "200":
          description: Tenant successfully updated - Returns updated tenant with new
            version number
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TenantDTO"
        "400":
          description: Invalid input - Validation errors or business rule violations
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TenantDTO"
        "404":
          description: Tenant not found - The specified tenant ID does not exist
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TenantDTO"
        "409":
          description: Conflict - Version mismatch due to concurrent modification
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TenantDTO"
    delete:
      tags:
      - Tenant Management
      summary: Delete tenant
      description: "Permanently deletes a tenant and all associated resources including\
        \ settings, branding, provider relationships, and audit history. This is a\
        \ destructive operation that cannot be undone. Consider deactivating the tenant\
        \ instead by updating its status to INACTIVE. Deletion may fail if tenant\
        \ has active transactions or dependencies."
      operationId: deleteTenant
      parameters:
      - name: id
        in: path
        description: Unique identifier (UUID) of the tenant to delete
        required: true
        schema:
          type: string
          format: uuid
        example: 123e4567-e89b-12d3-a456-426614174000
      - name: X-Idempotency-Key
        in: header
        description: "Unique key for idempotent requests. If provided, ensures that\
          \ identical requests with the same key will only be processed once."
        required: false
        schema:
          type: string
      responses:
        "204":
          description: Tenant successfully deleted - No content returned
        "404":
          description: Tenant not found - The specified tenant ID does not exist
        "409":
          description: Conflict - Cannot delete tenant with active dependencies or
            transactions
        "403":
          description: Forbidden - Insufficient permissions to delete tenant
